name: keepalive

# Pings /health every 10 minutes so the Render free-tier server never hits the
# 15-minute inactivity sleep and cold-starts. One service on all month fits in
# the 750 h/month free allowance (~744 h). Set the GAME_SERVER_URL secret in
# the repo settings (Settings → Secrets → Actions) to the Render service URL,
# e.g. https://poker-sim-server.onrender.com
#
# To upgrade: migrate to Oracle Always Free (VM ARM, 24/7) — documented in
# docs/infra-keepalive.md.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          if [ -z "$GAME_SERVER_URL" ]; then
            echo "GAME_SERVER_URL secret not set — skipping ping."
            exit 0
          fi
          curl -fsS --max-time 15 "${GAME_SERVER_URL}/health"
        env:
          GAME_SERVER_URL: ${{ secrets.GAME_SERVER_URL }}
