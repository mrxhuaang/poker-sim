name: node

# Lints and tests the Next.js app (Vitest). The evaluator parity fixture
# (testdata/eval-parity.json) is covered here; the Go evaluator side of the
# same fixture is covered in server.yml (go test ./...).

on:
  push:
    paths:
      - "src/**"
      - "testdata/**"
      - "package*.json"
      - ".github/workflows/node.yml"
  pull_request:
    paths:
      - "src/**"
      - "testdata/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
