name: server

# Vets, tests and builds the Go game server.

on:
  push:
    paths:
      - "server/**"
      - "testdata/**"
      - ".github/workflows/server.yml"
  pull_request:
    paths:
      - "server/**"
      - "testdata/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
